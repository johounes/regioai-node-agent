# Baut das Node-Agent-Docker-Image und pusht es nach GHCR.
#
# Dieser Workflow gehört in das separate, öffentliche Repository
#   github.com/johounes/regioai-node-agent
# (in dem die Inhalte des node-agent/-Ordners im Repo-Root liegen).
#
# Hinweis: GHCR-Pakete sind anfangs "private". Einmalig unter
#   Repo → Packages → regioai-node-agent → Package settings →
#   Change visibility → Public
# auf öffentlich stellen, damit `docker compose pull` ohne Login funktioniert.

name: Build & Push Node-Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/johounes/regioai-node-agent:latest
            ghcr.io/johounes/regioai-node-agent:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
